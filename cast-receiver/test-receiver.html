<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AndroidRemote Test Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    #waiting { text-align: center; max-width: 36rem; }
    #waiting h1 { font-size: 2rem; margin-bottom: 0.75rem; color: #58a6ff; }
    #waiting p { color: #8b949e; font-size: 1rem; margin-bottom: 0.5rem; }
    #code {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.5rem;
      margin: 1rem 0;
      color: #58a6ff;
    }
    #video-container {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #000;
      position: fixed;
      inset: 0;
    }
    video { width: 100%; height: 100%; object-fit: contain; }
    #status { margin-top: 1rem; color: #8b949e; min-height: 1.5rem; }
    .badge {
      display: inline-block;
      background: #238636;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    .hint { font-size: 0.8rem; color: #6e7681; margin-top: 1rem; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="waiting">
    <span class="badge">Mac relay test — no Chromecast</span>
    <h1>AndroidRemote</h1>
    <p>Enter this code in iPhone → <strong>Test</strong> tab</p>
    <div id="code">------</div>
    <p id="status">Waiting for iPhone to link…</p>
    <p class="hint" id="relay-hint">
      Relay: <code id="relay-url">…</code><br />
      Do not add <code>?iphone=</code> — that old URL hits the iPhone and fails.
    </p>
  </div>
  <div id="video-container">
    <video id="remote-video" autoplay playsinline></video>
  </div>

  <script>
    const STUN = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    let sessionId = null;
    let peerConnection = null;
    let icePollTimer = null;
    let linkPollTimer = null;
    let webRtcStarted = false;
    const seenSenderIce = new Set();
    let statusPollTimer = null;
    let isTeardown = false;

    const pairingCode = generatePairingCode();
    document.getElementById('code').textContent = pairingCode;

    if (new URLSearchParams(location.search).has('iphone')) {
      setStatus('Remove ?iphone= from URL — use Mac relay only (see hint below)');
    }
    document.getElementById('relay-url').textContent =
      `${location.origin}${location.pathname}`;

    postJson(relayUrl('/test/register'), { code: pairingCode }).catch(console.warn);

    function relayBase() {
      const port = location.port || (location.protocol === 'https:' ? '443' : '80');
      return `${location.protocol}//${location.hostname}:${port}`;
    }

    function relayUrl(path) {
      return `${relayBase()}${path}`;
    }

    function generatePairingCode() {
      return String(Math.floor(100000 + Math.random() * 900000));
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function getJson(url) {
      const res = await fetch(url);
      if (res.status === 204) return null;
      if (!res.ok) return null;
      return res.json();
    }

    async function postJson(url, body) {
      return fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }

    function showVideo() {
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('video-container').style.display = 'block';
    }

    function teardownWebRtc(reason) {
      if (isTeardown) return;
      isTeardown = true;
      if (icePollTimer) {
        clearInterval(icePollTimer);
        icePollTimer = null;
      }
      if (statusPollTimer) {
        clearInterval(statusPollTimer);
        statusPollTimer = null;
      }
      seenSenderIce.clear();
      if (peerConnection) {
        peerConnection.ontrack = null;
        peerConnection.onicecandidate = null;
        peerConnection.onconnectionstatechange = null;
        peerConnection.oniceconnectionstatechange = null;
        peerConnection.close();
        peerConnection = null;
      }
      const video = document.getElementById('remote-video');
      video.srcObject = null;
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('waiting').style.display = 'block';
      webRtcStarted = false;
      setStatus(reason || 'Broadcast ended');
    }

    function startStatusPolling() {
      if (statusPollTimer) clearInterval(statusPollTimer);
      statusPollTimer = setInterval(async () => {
        if (!sessionId || isTeardown) return;
        const status = await getJson(
          relayUrl(`/status?sessionId=${encodeURIComponent(sessionId)}`)
        );
        if (status && (status.state === 'ended' || status.state === 'disconnected')) {
          teardownWebRtc('Broadcast stopped');
        }
      }, 800);
    }

    function startLinkPolling() {
      if (linkPollTimer) clearInterval(linkPollTimer);
      linkPollTimer = setInterval(async () => {
        try {
          const link = await getJson(
            relayUrl(`/test/link?code=${encodeURIComponent(pairingCode)}`)
          );
          if (link && link.sessionId) {
            clearInterval(linkPollTimer);
            sessionId = link.sessionId;
            isTeardown = false;
            setStatus(`Linked (${sessionId.slice(0, 8)}…) — start screen broadcast on iPhone`);
            watchForWebRtc();
          }
        } catch (e) {
          setStatus('Cannot reach Mac relay — is lan-test-server.py running?');
        }
      }, 800);
    }

    async function waitForOffer() {
      for (let i = 0; i < 180; i++) {
        const offerMsg = await getJson(
          relayUrl(`/sdp/offer?sessionId=${encodeURIComponent(sessionId)}`)
        );
        if (offerMsg && offerMsg.type === 'offer' && offerMsg.sdp) return offerMsg.sdp;
        if (i % 4 === 0) {
          setStatus(`Waiting for iPhone broadcast… (${sessionId.slice(0, 8)}…)`);
        }
        await sleep(500);
      }
      throw new Error('No offer — Link Receiver on iPhone, then start screen broadcast');
    }

    function startIcePolling() {
      if (icePollTimer) clearInterval(icePollTimer);
      icePollTimer = setInterval(async () => {
        try {
          if (!peerConnection) return;
          const list = await getJson(
            relayUrl(`/ice?sessionId=${encodeURIComponent(sessionId)}&side=sender`)
          );
          if (!list || !list.candidates) return;
          for (const c of list.candidates) {
            if (!c.candidate || seenSenderIce.has(c.candidate)) continue;
            seenSenderIce.add(c.candidate);
            try {
              await peerConnection.addIceCandidate({
                candidate: c.candidate,
                sdpMid: c.sdpMid,
                sdpMLineIndex: c.sdpMLineIndex,
              });
              console.log('added sender ICE', c.candidate.slice(0, 48));
            } catch (e) {
              console.warn('addIceCandidate', e);
            }
          }
        } catch (e) {
          console.warn('ICE poll error', e);
        }
      }, 300);
    }

    function attachRemoteTrack(event) {
      const video = document.getElementById('remote-video');
      const track = event.track;
      if (event.streams && event.streams[0]) {
        video.srcObject = event.streams[0];
      } else if (track) {
        video.srcObject = new MediaStream([track]);
      }
      if (track) {
        track.enabled = true;
        track.onunmute = () => {
          console.log('video track unmuted');
          setStatus('Video playing');
        };
        track.onmute = () => console.warn('video track muted');
        track.onended = () => teardownWebRtc('Stream ended');
      }
      video.muted = true;
      video.playsInline = true;
      video.play().catch(console.warn);
      showVideo();
    }

    async function startWebRtc() {
      if (!sessionId) return;
      setStatus('Waiting for iPhone screen broadcast…');
      const offerSdp = await waitForOffer();

      peerConnection = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
        iceTransportPolicy: 'all',
        bundlePolicy: 'max-bundle',
      });
      peerConnection.addTransceiver('video', { direction: 'recvonly' });

      peerConnection.ontrack = (event) => {
        console.log('ontrack', event.track?.kind, event.track?.readyState);
        attachRemoteTrack(event);
        setStatus('Receiving video…');
      };
      peerConnection.onconnectionstatechange = () => {
        if (!peerConnection || isTeardown) return;
        const ice = peerConnection.iceConnectionState;
        const conn = peerConnection.connectionState;
        setStatus(`WebRTC conn=${conn} ice=${ice}`);
        if (conn === 'failed' || ice === 'failed') {
          teardownWebRtc(`WebRTC failed (ice=${ice})`);
        } else if (conn === 'closed' || conn === 'disconnected') {
          teardownWebRtc('Connection closed');
        }
      };
      peerConnection.oniceconnectionstatechange = () => {
        if (!peerConnection || isTeardown) return;
        const ice = peerConnection.iceConnectionState;
        console.log('iceConnectionState', ice);
        if (ice === 'disconnected' || ice === 'closed' || ice === 'failed') {
          teardownWebRtc('Broadcast ended');
        }
      };

      peerConnection.onicecandidate = (event) => {
        if (!event.candidate) return;
        postJson(relayUrl('/ice?side=receiver'), {
          sessionId,
          candidate: event.candidate.candidate,
          sdpMid: event.candidate.sdpMid,
          sdpMLineIndex: event.candidate.sdpMLineIndex,
        }).catch(console.error);
      };

      await peerConnection.setRemoteDescription({ type: 'offer', sdp: offerSdp });
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);

      await postJson(relayUrl('/sdp'), {
        sessionId,
        type: 'answer',
        sdp: answer.sdp,
      });

      startIcePolling();
      startStatusPolling();
    }

    function watchForWebRtc() {
      const timer = setInterval(() => {
        if (sessionId && !webRtcStarted) {
          webRtcStarted = true;
          clearInterval(timer);
          startWebRtc().catch((e) => {
            webRtcStarted = false;
            console.error(e);
            setStatus(e.message || 'WebRTC error');
            watchForWebRtc();
          });
        }
      }, 1000);
    }

    startLinkPolling();
  </script>
</body>
</html>
