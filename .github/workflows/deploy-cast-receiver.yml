# Deploy cast-receiver/ to GitHub Pages (free HTTPS hosting for the Cast web receiver).
name: Deploy Cast Receiver

on:
  push:
    branches: [main]
    paths:
      - "cast-receiver/**"
      - ".github/workflows/deploy-cast-receiver.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cast-receiver

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
