name: AndroidRemote
options:
  bundleIdPrefix: com.androidremote
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: 149.0.0
  GoogleCast:
    url: https://github.com/castlabs/google-cast-spm
    from: 4.8.4

targets:
  AndroidRemote:
    type: application
    platform: iOS
    settings:
      base:
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: APP_TARGET
        PRODUCT_BUNDLE_IDENTIFIER: com.androidremote.app
        OTHER_LDFLAGS: $(inherited) -ObjC -lc++
    sources:
      - path: AndroidRemote
      - path: Shared
    resources:
      - path: AndroidRemote/Resources/Assets.xcassets
    dependencies:
      - target: BroadcastExtension
        embed: true
      - package: WebRTC
        product: WebRTC
      - package: GoogleCast
        product: GoogleCastStatic
      - sdk: SystemConfiguration.framework
      - sdk: CFNetwork.framework
      - sdk: Security.framework
      - sdk: CoreGraphics.framework
      - sdk: AVFoundation.framework
      - sdk: AVKit.framework
      - sdk: AudioToolbox.framework
      - sdk: MediaAccessibility.framework
      - sdk: MediaPlayer.framework
      - sdk: QuartzCore.framework
    entitlements:
      path: AndroidRemote/AndroidRemote.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.androidremote.shared
    info:
      path: AndroidRemote/Info.plist
      properties:
        CFBundleDisplayName: AndroidRemote
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSLocalNetworkUsageDescription: "Find Chromecast and Google TV devices on your Wi-Fi network"
        NSBonjourServices:
          - _androidremote._tcp
          - _googlecast._tcp

  BroadcastExtension:
    type: app-extension
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.androidremote.app.BroadcastExtension
    sources:
      - path: BroadcastExtension
      - path: Shared
    dependencies:
      - package: WebRTC
        product: WebRTC
    entitlements:
      path: BroadcastExtension/BroadcastExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.androidremote.shared
    info:
      path: BroadcastExtension/Info.plist
      properties:
        CFBundleDisplayName: AndroidRemote Broadcast
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer

schemes:
  AndroidRemote:
    build:
      targets:
        AndroidRemote: all
        BroadcastExtension: all
    run:
      config: Debug
    archive:
      config: Release
